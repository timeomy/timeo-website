<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You — Timeo</title>
  <meta name="description" content="We've received your inquiry. Our team will be in touch shortly." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #090e1a;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --accent: #6366f1;
      --accent-end: #8b5cf6;
      --text: #f1f5f9;
      --muted: rgba(255,255,255,0.5);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 24px;
      text-align: center;
      background-image:
        radial-gradient(ellipse 60% 40% at 50% 0%, rgba(99,102,241,0.18) 0%, transparent 70%);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 56px 48px;
      max-width: 520px;
      width: 100%;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent-end));
      border-radius: 24px 24px 0 0;
    }

    .logo {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 36px;
      display: inline-block;
    }

    .logo span {
      background: linear-gradient(135deg, var(--accent), var(--accent-end));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .icon-wrap {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(139,92,246,0.2));
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
    }

    .icon-wrap svg {
      color: #818cf8;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.8px;
      margin-bottom: 16px;
      line-height: 1.2;
    }

    p {
      font-size: 16px;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 12px;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 32px 0;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent-end));
      color: #fff;
      font-weight: 600;
      font-size: 15px;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 12px;
      transition: opacity 0.2s, transform 0.2s;
    }

    .back-link:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .footer-note {
      margin-top: 32px;
      font-size: 13px;
      color: rgba(255,255,255,0.25);
    }

    .footer-note a {
      color: rgba(255,255,255,0.4);
      text-decoration: none;
    }

    .footer-note a:hover {
      color: rgba(255,255,255,0.7);
    }

    @media (max-width: 480px) {
      .card { padding: 40px 24px; }
      h1 { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">timeo<span>.</span></div>

    <div class="icon-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
        <polyline points="22 4 12 14.01 9 11.01"/>
      </svg>
    </div>

    <h1>We've received<br />your inquiry</h1>
    <p>Our team will reach out within 24 hours to discuss getting your business on Timeo.</p>
    <p>In the meantime, feel free to email us at <strong style="color:rgba(255,255,255,0.75)">hello@timeo.my</strong> if you have any questions.</p>

    <hr class="divider" />

    <a href="https://timeo.my" class="back-link">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
      Back to timeo.my
    </a>
  </div>

  <p class="footer-note">© 2026 <a href="https://timeo.my">Timeo</a>. All rights reserved.</p>
</body>
</html>
